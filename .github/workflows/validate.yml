name: Validate Hermes Profile Template

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate with reusable profile action
        uses: ./.github/actions/validate-profile
        with:
          install-smoke: "false"
      - name: Smoke-test secret-safe demo kit
        run: make demo-smoke
      - name: Smoke-test install path
        run: make smoke
