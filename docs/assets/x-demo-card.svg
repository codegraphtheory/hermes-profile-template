<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Hermes Profile Template demo</title>
  <desc id="desc">One prompt becomes a complete installable Hermes Agent profile repo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09090f"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#2d0b50"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="120" r="240" fill="#7c3aed" opacity="0.18" filter="url(#glow)"/>
  <circle cx="190" cy="650" r="260" fill="#06b6d4" opacity="0.14" filter="url(#glow)"/>
  <rect x="74" y="72" width="1132" height="576" rx="34" fill="#0b1020" stroke="#334155" stroke-width="2" opacity="0.96"/>
  <rect x="74" y="72" width="1132" height="64" rx="34" fill="#111827"/>
  <circle cx="116" cy="104" r="10" fill="#ef4444"/>
  <circle cx="148" cy="104" r="10" fill="#f59e0b"/>
  <circle cx="180" cy="104" r="10" fill="#22c55e"/>
  <text x="640" y="112" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" fill="#94a3b8">GraphTheory demo on X</text>
  <text x="118" y="205" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="700" fill="#e5e7eb">Hermes Profile Template</text>
  <text x="118" y="274" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#ffffff">One prompt in.</text>
  <text x="118" y="342" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="56" font-weight="800" fill="#ffffff">Installable agent repo out.</text>
  <rect x="118" y="386" width="610" height="72" rx="14" fill="#030712" stroke="#1f2937"/>
  <text x="148" y="432" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#67e8f9">profile-architect chat</text>
  <path d="M820 232 L1038 360 L820 488 Z" fill="url(#accent)" filter="url(#glow)"/>
  <circle cx="891" cy="360" r="150" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.5"/>
  <text x="930" y="598" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="700" fill="#e0f2fe">Watch the 60 second demo</text>
  <rect x="118" y="512" width="520" height="42" rx="21" fill="#111827" stroke="#334155"/>
  <text x="146" y="540" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" fill="#cbd5e1">SOUL.md + distribution.yaml + skills + CI + docs</text>
</svg>
