name: Validate Hermes Profile Distribution

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Validate Hermes profile distribution
        uses: codegraphtheory/hermes-profile-template/.github/actions/validate-profile@main
        with:
          install-smoke: "false"
